version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: room-reservation-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-room_reservation}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - room-reservation-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./tsp-room-booking-backend
      dockerfile: Dockerfile
    container_name: room-reservation-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-room_reservation}
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      TZ: Africa/Tunis
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - room-reservation-network
    restart: unless-stopped


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: room-reservation-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - room-reservation-network
    restart: unless-stopped


volumes:
  postgres_data:

networks:
  room-reservation-network:
    driver: bridge