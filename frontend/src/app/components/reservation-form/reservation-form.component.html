<div class="glass-panel" style="max-width: 600px; margin: 2rem auto;">
  <h2 style="margin-bottom: 2rem; color: var(--primary-color);">
    {{ isEditMode ? 'Edit Reservation' : 'Book a Room' }}
  </h2>

  <form (ngSubmit)="saveReservation()">
    <div style="margin-bottom: 1.5rem;">
      <label>Room</label>
      <input type="text" [value]="room" readonly class="is-readonly" style="background: var(--input-bg); opacity: 0.7;" />
    </div>
    <div class="flex flex-col gap-2" style="margin-bottom: 1.5rem;">
      <div class="form-group">
        <label>Start Time *</label>
        <input type="datetime-local" [(ngModel)]="startTime" (change)="loadSysConfig()" name="startTime" required style="width: 100%; padding: 0.75rem 1rem; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-color);" />
      </div>

      <div class="form-group">
        <label>End Time *</label>
        <input type="datetime-local" [(ngModel)]="endTime" (change)="loadSysConfig()" name="endTime" required style="width: 100%; padding: 0.75rem 1rem; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-color);" />
      </div>
    </div>

    <div>
      <label>Activity *</label>
      <select [(ngModel)]="activityType" name="activityType" required style="margin-bottom: 1rem; width: 100%; padding: 0.75rem 1rem; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-color);">
        <option value="" disabled selected>Select an activity</option>
        <option *ngFor="let act of activities" [value]="act">{{ act }}</option>
      </select>
    </div>

    <div *ngIf="activityType === 'Other'" style="margin-bottom: 1rem;">
      <label>Activity Description *</label>
      <input type="text" [(ngModel)]="activityDesc" name="activityDesc" placeholder="Describe your activity" required />
    </div>

    <div>
      <label>Hardware needed *</label>
      <select [(ngModel)]="hardware" name="hardware" required style="width: 100%; padding: 0.75rem 1rem; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-color); margin-bottom: 0.5rem;">
        <option value="" disabled selected>Select hardware</option>
        <option *ngFor="let hw of hardwareList" [value]="hw.name" [disabled]="hw.available <= 0">
          {{ hw.name }} (Available: {{ hw.available }} / {{ hw.quantity }})
        </option>
      </select>
      <div style="display: flex; align-items: center; gap: 0.5rem;" *ngIf="hardware && hardware !== '-'">
        <input type="checkbox" id="hwOnly" [(ngModel)]="isHardwareOnly" name="isHardwareOnly" style="width: auto; height: 18px; margin: 0; cursor: pointer;" />
        <label for="hwOnly" style="margin: 0; font-size: 0.9rem; font-weight: normal; cursor: pointer;">
          Hardware Only (I don't need the physical room)
        </label>
      </div>
    </div>

    <div>
      <label>Software needed *</label>
      <select [(ngModel)]="software" name="software" required style="width: 100%; padding: 0.75rem 1rem; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-color);">
        <option value="" disabled selected>Select software</option>
        <option *ngFor="let sw of softwareList" [value]="sw.name">{{ sw.name }}</option>
      </select>
    </div>

    <div class="flex gap-2" style="margin-top: 2rem;">
      <button type="submit" class="btn" style="flex:1">
        {{ isEditMode ? 'Save Changes' : 'Confirm Booking' }}
      </button>
      <button type="button" class="btn btn-secondary" style="flex:1" routerLink="/reservations">
        Cancel
      </button>
    </div>
  </form>
</div>
