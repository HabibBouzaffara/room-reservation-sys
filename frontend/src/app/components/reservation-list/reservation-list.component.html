<div class="flex justify-between items-center" style="margin-bottom: 0.5rem; padding-right: 1rem; padding-left: 1rem; margin-top: 0.5rem;">
  <div class="room-selector flex gap-1">
    <button *ngFor="let rm of rooms" 
            class="btn" 
            [ngClass]="selectedRoom === rm ? '' : 'btn-secondary'"
            (click)="setRoom(rm)">
      Room {{ rm }}
    </button>
  </div>
  <button class="btn" routerLink="/reservations/new" [queryParams]="{ room: selectedRoom }">Book a Room</button>
</div>

<div class="calendar-scroll-container">
  <div class="calendar-wrapper">
    <!-- Time Labels Column -->
    <div class="time-column">
       <div class="time-header-space"></div>
       <div class="time-labels-container">
          <div class="time-label" *ngFor="let t of timeLabels" [style.height.px]="60 * PIXELS_PER_MINUTE">
             <span style="position: relative; top: -10px;">{{ t }}</span>
          </div>
       </div>
    </div>
    
    <!-- Weeks -->
    <div class="week-group" *ngFor="let w of weeks; let i = index">
       <div class="week-header">
          <span style="font-size: 0.8rem; margin-right: 4px;">CW</span>
          <input *ngIf="isAdmin" type="number" [value]="w.cw" (change)="updateWeek($any($event.target).value, i)" style="width: 70px; background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-color); text-align: center; border-radius: 4px;" />
          <span *ngIf="!isAdmin">{{ w.name }}</span>
       </div>
       <div class="days-row">
          <div class="day-column" *ngFor="let d of w.days" [class.is-today]="isToday(d.date)">
             <div class="day-header">
                <div>{{ d.name }}</div>
                <div class="day-date">{{ d.date | date:'mediumDate' }}</div>
                <div *ngIf="isToday(d.date)" class="today-dot"></div>
             </div>
             
             <div class="day-grid-container"
                  (mousedown)="onMouseDown($event, d)"
                  (mousemove)="onMouseMove($event, d)"
                  (mouseup)="onMouseUp($event, d)"
                  (mouseleave)="isDragging = false">

                <!-- Drag Selection Overlay -->
                <div *ngIf="isDragging && dragDay === d"
                     class="drag-selection-box"
                     [style.top.px]="getDragBoxTop()"
                     [style.height.px]="getDragBoxHeight()">
                </div>

                <!-- Background grid lines -->
                <div class="grid-line" *ngFor="let t of timeLabels" [style.height.px]="60 * PIXELS_PER_MINUTE"></div>
                
                <!-- Reservations -->
                <div *ngFor="let r of d.reservations" 
                     class="reservation-card"
                     [ngClass]="r.type === 'BUFFER' ? 'res-buffer' : (r.isHardwareOnly ? 'res-hw-only' : 'res-normal')"
                     [style.top.px]="getTopPos(r)"
                     [style.height.px]="getHeight(r)">
                     
                   <div *ngIf="r.type === 'BUFFER'; else normalContent" class="buffer-content">
                      TSP Buffer
                   </div>
                   <ng-template #normalContent>
                      <div class="res-title" [title]="r.activity">
                         <span *ngIf="r.isHardwareOnly" style="color: var(--warning-color, #fbbf24)">[HW] </span>
                         {{ r.activity }}
                      </div>
                      <div class="res-body">{{ r.startTime | date:'shortTime' }} - {{ r.endTime | date:'shortTime' }}</div>
                      <div class="res-body">User: {{ r.user?.name || 'TSP System' }}</div>
                      <div class="res-body" *ngIf="getHeight(r) > 50">HW: {{ r.hardware }}</div>
                      <div class="res-body" *ngIf="getHeight(r) > 65">SW: {{ r.software }}</div>
                      <div class="res-actions" *ngIf="canModify(r)">
                         <button (click)="editReservation(r.id)" title="Edit">✎</button>
                         <button (click)="deleteReservation(r.id, $event)" title="Cancel">✖</button>
                      </div>
                   </ng-template>
                </div>
             </div>
          </div>
       </div>
    </div>

  </div>
</div>
